# ============================================================================
# STDD Agent Behavior Verification Spec (V2.6+)
# ============================================================================
# 用于验证 AI Agent 执行事务性任务后的"世界状态"是否与预期一致。
#
# 与代码 spec 的本质区别：
#   代码 spec = 验证"代码产物"的正确性（GIVEN 输入 WHEN 调用函数 THEN 返回值）
#   Agent spec = 验证"操作后的世界状态"与预期一致（GIVEN 初始状态 WHEN Agent操作 THEN 环境状态）
#
# 适用范围：
#   - 文档整理、脚本执行、部署迁移、数据处理等非编程任务
#   - 单系统 Agent 操作用此模板
#   - TEAM 版可扩展 environment_systems 为多系统，启用 cross_check
# ============================================================================

# ── 基础标识 ────────────────────────────────────────────────────────────────

agent_task_id: ""           # 唯一标识，如 "task-001-deploy-migration"
change_id: ""               # 所属 Change ID
description: ""             # 任务简述

# ── 环境系统 (V2.6: 单系统; TEAM版: 可多系统) ────────────────────────────────
# 定义 Agent 操作涉及的环境系统。
# 开源版通常为单一系统（文件系统、数据库、本地服务等）。
# TEAM 版可定义多个系统（CRM + 财务系统等），并启用 cross_check。

environment_systems:
  - name: ""                # 系统名称，如 "filesystem" | "database" | "api_server"
    type: ""                # 系统类型：filesystem | database | api | saas | custom
    endpoint: ""            # 连接端点（可选）：本地路径、数据库连接串、API URL
    description: ""         # 系统说明

# ── 操作前初始状态 ──────────────────────────────────────────────────────────
# 定义 Agent 开始操作前各系统的基线状态。
# 这是所有检查点断言的参照基线。

initial_state:
  # 示例（文件系统类任务）：
  # filesystem:
  #   files:
  #     - path: /app/config.yaml
  #       exists: true
  #       contains: "timeout: 30"
  #   directories:
  #     - path: /app/logs/
  #       exists: false

  # 示例（数据库类任务）：
  # database:
  #   records:
  #     - table: users
  #       id: 1
  #       status: "pending"

  {}                        # 按实际任务填写

# ── 检查点序列 ──────────────────────────────────────────────────────────────
# 每个检查点 = 一个 Agent 操作步骤的验证单元。
# 检查点按顺序执行，上游 CP 失败会阻断下游 CP（防止级联崩塌）。

checkpoints: []

# 检查点条目格式：
#
# - id: CP-1                                      # 唯一标识
#   description: "操作描述"                         # 此检查点验证什么
#   weight: 10                                     # 权重 1-10（10 = 最关键）
#
#   given_state: "操作前的环境状态描述"              # 人可读的初始状态说明
#   when_action: "Agent 执行的具体操作描述"           # 人可读的操作说明
#
#   expected_state:                                # 操作后的期望状态
#     assertions:                                  # 单系统断言
#       - target: "查询路径/字段"                    # 如 "filesystem./app/config.yaml.permissions"
#         operator: equals                         # equals | not_equals | contains | not_contains
#         value: "0644"                            # 期望值
#       - target: "database.users[1].status"
#         operator: equals
#         value: "active"
#
#     # cross_check:                               # 【TEAM 版专属】跨系统一致性断言
#     #   - source: crm.invoices["#INV-042"].customer_name
#     #     target: finance.accounts["ACC-042"].owner
#     #     operator: equals
#
#   verification_method: api_query                 # api_query | file_check | db_query | log_query | manual
#   timeout_seconds: 30                            # 此 CP 的超时时间（可选，默认 30）

# ── 追溯链 ──────────────────────────────────────────────────────────────────
# 定义检查点之间的逻辑关系

traceability: []

# 追溯条目格式：
#
# - from: CP-1           # 源检查点
#   to: CP-2             # 目标检查点
#   type: prerequisite   # prerequisite（CP-2 依赖 CP-1 通过）
#                        # audit（CP-2 是 CP-1 的审计验证）
#                        # parallel（CP-1 和 CP-2 可并行执行）

# ── 元信息 ──────────────────────────────────────────────────────────────────

meta:
  created_by: ""            # 创建者
  created_at: ""            # 创建时间 (ISO 8601)
  scope: single             # single（单系统，开源版）| multi（多系统，TEAM 版）
  estimated_checkpoints: 0  # 预估检查点数量
