# ============================================================================
# STDD Canonical Proposal (V2.6+)
# ============================================================================
# 这是 STDD 双轨制文档体系中的 Canonical Source。
# Human View（proposal-brief.md）由此文件通过 stdd canon generate 自动生成。
# 编辑此 YAML 后运行 stdd canon generate 即可更新 Human View。
# ============================================================================

# ── 基础标识 ────────────────────────────────────────────────────────────────

change_id: ""               # 唯一标识，如 "2026-05-26-api-rate-limit"
title: ""                   # 变更标题，同时作为 change 目录名的基础

# ── 变更等级 ────────────────────────────────────────────────────────────────
# V2.6 新增：标记此 Change 是否为关键变更。
# critical: true 的 Change 在 Phase 2 须通过锚定评估（anchoring.level ≥ L3）。
# critical: false 的 Change 默认使用 L1 行为锚定。

critical: false

# ── 阶段标记 ────────────────────────────────────────────────────────────────
# 此 Change 所属的项目阶段分类（可选，用于组织和过滤）
# foundation | feature | enhancement | fix | refactor | docs | config

phase: feature

# ── 动机 ────────────────────────────────────────────────────────────────────

why: |
  <问题陈述：用户视角，为什么需要这个变更>

# ── 范围定义 ────────────────────────────────────────────────────────────────

scope:
  # 纳入范围的模块/功能
  included:
    - module: ""           # 模块名
      functions: []        # 涉及的具体函数/文件
      description: ""      # 变更描述

  # 明确排除的内容及原因
  excluded:
    - module: ""           # 排除的模块名
      reason: ""           # 排除原因

  # 变更项列表（对应原 proposal.md 的 What Changes）
  what_changes:
    - ""

  # 明确不做的事项（对应原 proposal.md 的 NonGoals）
  non_goals:
    - ""

# ── 依赖与产出 ──────────────────────────────────────────────────────────────

# 上游依赖：此 Change 依赖的其他 Change 或模块
dependencies: []

# 此 Change 的产出物
outputs:
  - type: code              # code | spec | config | docs | static_site
    path: ""                # 产出路径
    description: ""

# ── 影响范围 ────────────────────────────────────────────────────────────────

impact:
  code: []                  # 代码文件变更
  config: []                # 配置文件变更
  infrastructure: []        # 基础设施变更

# ── 约束条件 (V2.5) ─────────────────────────────────────────────────────────

constraints:
  - ""                      # 技术/资源/时间约束

# ── 干系人 (V2.5) ───────────────────────────────────────────────────────────

stakeholders:
  - ""                      # 受影响方或相关角色

# ── 成功标准 ────────────────────────────────────────────────────────────────
# 可验证的完成条件。每条应为可测试的、有明确通过/失败判断标准的陈述。

success_criteria:
  - ""

# ── 风险标注 (V2.5) ─────────────────────────────────────────────────────────
# 将风险关联到具体 capability

risk_areas:
  - capability: ""          # 受影响的 capability 名称
    risk: ""                # 风险描述

# ── 锚定策略 (V2.6 新增) ────────────────────────────────────────────────────
# 定义此 Change 的 Spec 锚定等级，用于事前消除 AI 实现方差。
#
# L1 · 行为锚定：spec 的 THEN 用 SHALL 写死所有强制行为（所有 Change 默认）
# L2 · 接口锚定：spec 中附加精确的函数签名/API 契约/数据 schema
# L3 · 模式锚定：spec 中引用参考实现模式（如"参照 Change-X 的模式"）
# L4 · 基准锚定：spec 中附加参考实现代码（Anchor Implementation）

anchoring:
  level: L1                 # L1 | L2 | L3 | L4
  reference_changes: []     # L3 时引用已有 Change ID 列表
  anchor_implementations: [] # L4 时附参考代码文件路径列表 (anchors/*.py)

# ── 风险评估 (V2.6 新增) ────────────────────────────────────────────────────

risk_assessment:
  safety_critical: false    # 涉及安全（认证/授权/加密/数据保护）
  financial: false          # 涉及金融交易或资金流转
  cross_system: false       # 涉及多系统协调（CRM/财务/ERP 等）
